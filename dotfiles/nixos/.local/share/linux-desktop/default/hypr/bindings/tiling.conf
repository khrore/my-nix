# Close windows
bindd = ALT, W, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
bindd = ALT, P, Pseudo window, pseudo, # dwindle
bindd = ALT, T, Toggle window floating/tiling, togglefloating,
bindd = ALT, F, Full screen, fullscreen, 0
bindd = ALT, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# Move focus with ALT + vi motion
bindd = ALT, H, Move window focus left, movefocus, l
bindd = ALT, L, Move window focus right, movefocus, r
bindd = ALT, K, Move window focus up, movefocus, u
bindd = ALT, J, Move window focus down, movefocus, d

# Switch workspaces with ALT + [1-9; 0]
bindd = ALT, code:10, Switch to workspace 1, workspace, 1
bindd = ALT, code:11, Switch to workspace 2, workspace, 2
bindd = ALT, code:12, Switch to workspace 3, workspace, 3
bindd = ALT, code:13, Switch to workspace 4, workspace, 4
bindd = ALT, code:14, Switch to workspace 5, workspace, 5
bindd = ALT, code:15, Switch to workspace 6, workspace, 6
bindd = ALT, code:16, Switch to workspace 7, workspace, 7
bindd = ALT, code:17, Switch to workspace 8, workspace, 8
bindd = ALT, code:18, Switch to workspace 9, workspace, 9
bindd = ALT, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace with ALT + SHIFT + [1-9; 0]
bindd = ALT SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = ALT SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = ALT SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = ALT SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = ALT SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = ALT SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = ALT SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = ALT SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = ALT SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = ALT SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# Move active window silently to a workspace with ALT + SHIFT + ALT + [1-9; 0]
bindd = ALT SHIFT ALT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = ALT SHIFT ALT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = ALT SHIFT ALT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = ALT SHIFT ALT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = ALT SHIFT ALT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = ALT SHIFT ALT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = ALT SHIFT ALT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = ALT SHIFT ALT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = ALT SHIFT ALT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = ALT SHIFT ALT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = ALT SHIFT, H, Swap window to the left, swapwindow, l
bindd = ALT SHIFT, L, Swap window to the right, swapwindow, r
bindd = ALT SHIFT, K, Swap window up, swapwindow, u
bindd = ALT SHIFT, J, Swap window down, swapwindow, d

# Resize active window
bindd = ALT, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = ALT, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = ALT SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = ALT SHIFT, code:21, Expand window down, resizeactive, 0 100

# Toggle groups
bindd = ALT, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# Join groups
bindd = SUPER ALT, H, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, L, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, K, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, J, Move window to group on bottom, moveintogroup, d

# Navigate a single set of grouped windows
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
bindd = ALT CTRL, H, Move grouped window focus left, changegroupactive, b
bindd = ALT CTRL, L, Move grouped window focus right, changegroupactive, f

# Scroll through a set of grouped windows with SUPER + ALT + scroll
bindd = SUPER ALT, mouse_down, Next window in group, changegroupactive, f
bindd = SUPER ALT, mouse_up, Previous window in group, changegroupactive, b

# Activate window in a group by number
bindd = SUPER ALT, code:10, Switch to group window 1, changegroupactive, 1
bindd = SUPER ALT, code:11, Switch to group window 2, changegroupactive, 2
bindd = SUPER ALT, code:12, Switch to group window 3, changegroupactive, 3
bindd = SUPER ALT, code:13, Switch to group window 4, changegroupactive, 4
bindd = SUPER ALT, code:14, Switch to group window 5, changegroupactive, 5

# Cycle monitor scaling
bindd = ALT, Slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
